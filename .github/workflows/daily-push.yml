name: 财商课程每日推送

on:
  schedule:
    # 北京时间 07:00-09:00 每15分钟触发一次（8次/天），date guard 防重复
    - cron: '0,15,30,45 23 * * *'
    - cron: '0,15,30,45 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 执行每日推送
        env:
          CLAWBOT_TOKEN: ${{ secrets.CLAWBOT_TOKEN }}
          CLAWBOT_USER_ID: ${{ secrets.CLAWBOT_USER_ID }}
          CLAWBOT_BASE_URL: ${{ secrets.CLAWBOT_BASE_URL }}
        run: python auto_push.py

      - name: 提交进度更新
        run: |
          git config user.name "Finance Bot"
          git config user.email "bot@finance-course.dev"
          git add finance-course-progress.json
          if git diff --staged --quiet; then
            echo "进度无变化，跳过提交"
          else
            git commit -m "Update course progress"
            git push
          fi
